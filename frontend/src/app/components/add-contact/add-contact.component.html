<div class="max-w-md mx-auto mt-10 bg-white shadow-lg rounded-lg p-8">

  <h2 class="text-2xl font-bold mb-6 text-gray-800">
    Ajouter un contact
  </h2>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
      <input 
        type="text" 
        formControlName="first_name"
        class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
      >
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
      <input 
        type="text" 
        formControlName="last_name"
        class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
      >
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input 
        type="email" 
        formControlName="email"
        class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
      >
    </div>

    <button  
      type="submit"
      [disabled]="form.invalid"
      class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition disabled:opacity-50"
    >
      Ajouter
    </button>

    <button 
        type="button"
        [routerLink]="['/contacts']"
        class="bg-gray-400 text-white px-4 py-2 rounded"
      >
        Annuler
      </button>

  </form>

</div>
