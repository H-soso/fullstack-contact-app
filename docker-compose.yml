version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: gunicorn crm_api.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: crm
      DB_USER: crm_user
      DB_PASSWORD: crm_pass
      DB_HOST: db

  frontend:
    build: ./frontend
    ports:
      - "4201:80"

volumes:
  postgres_data:
